<!DOCTYPE html>
<html>
<head>
    <title>Password Strength Analyzer</title>

    <style>

        body{
            margin:0;
            padding:0;
            background:#0f172a;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:450px;
            background:#1e293b;
            padding:40px;
            border-radius:20px;
            box-shadow:0px 0px 20px cyan;
        }

        h1{
            text-align:center;
            color:#38bdf8;
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            font-size:18px;
            outline:none;
            margin-bottom:20px;
        }

        button{
            width:100%;
            padding:15px;
            background:#06b6d4;
            border:none;
            border-radius:10px;
            font-size:18px;
            color:white;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#0891b2;
        }

        .result{
            margin-top:25px;
            padding:20px;
            border-radius:10px;
            background:#0f172a;
            color:white;
        }

        .strong{
            color:lime;
            font-weight:bold;
        }

        .medium{
            color:orange;
            font-weight:bold;
        }

        .weak{
            color:red;
            font-weight:bold;
        }

        ul{
            margin-top:15px;
            padding-left:20px;
        }

        li{
            margin:8px 0;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>🔐 Password Analyzer</h1>

    <input type="password"
           id="password"
           placeholder="Enter Your Password">

    <button onclick="checkPassword()">
        Analyze Password
    </button>

    <div class="result" id="output">

        Password result will appear here...

    </div>

</div>

<script>

function checkPassword(){

    let password =
        document.getElementById("password").value;

    let strength = 0;

    let details = "";

    // LENGTH CHECK
    let lengthCheck = password.length >= 8;

    if(lengthCheck){
        strength++;
    }

    // UPPERCASE CHECK
    let upperCheck = /[A-Z]/.test(password);

    if(upperCheck){
        strength++;
    }

    // LOWERCASE CHECK
    let lowerCheck = /[a-z]/.test(password);

    if(lowerCheck){
        strength++;
    }

    // NUMBER CHECK
    let numberCheck = /[0-9]/.test(password);

    if(numberCheck){
        strength++;
    }

    // SPECIAL CHARACTER CHECK
    let specialCheck =
        /[!@#$%^&*]/.test(password);

    if(specialCheck){
        strength++;
    }

    let result = "";

    if(strength <= 2){

        result =
        "<p class='weak'>❌ Weak Password</p>";

    }
    else if(strength <= 4){

        result =
        "<p class='medium'>⚠️ Medium Password</p>";

    }
    else{

        result =
        "<p class='strong'>✅ Strong Password</p>";
    }

    details =
    `
    <ul>
        <li>Length >= 8 : ${lengthCheck}</li>
        <li>Uppercase Present : ${upperCheck}</li>
        <li>Lowercase Present : ${lowerCheck}</li>
        <li>Number Present : ${numberCheck}</li>
        <li>Special Character Present : ${specialCheck}</li>
    </ul>
    `;

    document.getElementById("output").innerHTML =
        result + details;
}

</script>

</body>
</html>
